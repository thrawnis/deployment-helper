services:
  dashboard:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      - dashboard_data:/data
      # Docker socket — allows deploy scripts to run docker/docker compose commands
      - /var/run/docker.sock:/var/run/docker.sock
      #
      # ── Project volumes ───────────────────────────────────────────────────
      # Mount each project folder so the container can run its deploy script.
      # Use the same absolute path inside the container as on the host so that
      # the paths in your .env work without any translation.
      #
      # Example (uncomment and adjust for each project in your .env):
      #   - /home/user/money-tracker:/home/user/money-tracker
      #   - /home/user/other-app:/home/user/other-app

volumes:
  dashboard_data:
