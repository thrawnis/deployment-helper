services:
  dashboard:
    build: .
    restart: unless-stopped
    ports:
      - "8089:8000"
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      - ./data:/data
      # Docker socket — allows deploy scripts to run docker/docker compose commands
      - /var/run/docker.sock:/var/run/docker.sock
      - /media/docker/waypoint:/media/docker/waypoint

